exclude: "^legacy/.*$"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff-check
      - id: ruff-format
        args: [--check]

  - repo: local
    hooks:
      - id: document-rule-docs
        name: document rule docs
        entry: uv run --extra docs python scripts/document_rules.py
        language: system
        pass_filenames: false
        always_run: true
